<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentient — Intelligent HR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes countUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseDot { 0%,100% { opacity:1; box-shadow: 0 0 0 0 currentColor; } 50% { opacity:0.7; box-shadow: 0 0 0 4px transparent; } }
    @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
    .animate-fade-in { animation: fadeIn 0.22s ease-out both; }
    .animate-slide-right { animation: slideInRight 0.25s ease-out both; }
    .animate-slide-left { animation: slideInLeft 0.25s ease-out both; }
    .animate-scale-in { animation: scaleIn 0.2s ease-out both; }
    .animate-count { animation: countUp 0.5s ease-out both; }
    .pulse-active { animation: pulseDot 2s ease-in-out infinite; }
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .sidebar-glow {
      box-shadow: inset -1px 0 0 rgba(99,102,241,0.08);
    }
    .card-glow:hover {
      box-shadow: 0 0 0 1px rgba(99,102,241,0.2), 0 8px 24px rgba(0,0,0,0.4);
    }
    .stat-glow {
      box-shadow: 0 0 30px rgba(99,102,241,0.08);
    }
    .btn-primary-glow:hover {
      box-shadow: 0 0 16px rgba(99,102,241,0.4);
    }
    .cmd-backdrop { background: rgba(2,6,23,0.8); backdrop-filter: blur(8px); }
    select option { background: #1e293b; }
    .nav-active { border-left: 2px solid #6366f1; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="root"></div>
  <script src="mock.js"></script>
  <script src="utils.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="layout.jsx"></script>
  <script type="text/babel" src="login.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="employees.jsx"></script>
  <script type="text/babel" src="leaves.jsx"></script>
  <script type="text/babel" src="orgchart.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
