services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      API_GATEWAY_PORT: 3004
      API_GATEWAY_CORS_ORIGINS: http://localhost:3000
      API_GATEWAY_TRUST_PROXY: "false"
      API_GATEWAY_JWT_SECRET: ${JWT_SECRET}
      HR_CORE_URL: http://host.docker.internal:3001
      SOCIAL_URL: http://host.docker.internal:3002
      AI_AGENTIC_URL: http://host.docker.internal:3003
    ports:
      - "3004:3004"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
