kind = "web"
previewPath = "/"
title = "Sentient HRIS"
version = "1.0.0"
id = "artifacts/sentient-hris"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21786

[services.development]
run = "pnpm --filter @workspace/sentient-hris run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sentient-hris", "run", "build" ]
publicDir = "artifacts/sentient-hris/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21786"
BASE_PATH = "/"
